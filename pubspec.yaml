name: riverpod_analyzer_utils
description: A project for analyzing Riverpod code. This is internally used by riverpod_lint and riverpod_generator
repository: https://github.com/rrousselGit/river_pod
issue_tracker: https://github.com/rrousselGit/riverpod/issues
funding:
  - https://github.com/sponsors/rrousselGit/
version: 1.0.0-dev.10

environment:
  sdk: ^3.12.0

dependencies:
  analyzer: ^13.3.0
  analyzer_buffer: ^0.3.3
  collection: ^1.19.1
  crypto: ^3.0.7
  freezed_annotation: ^3.1.0
  meta: ^1.18.3
  path: ^1.9.1
  source_span: ^1.10.2

dev_dependencies:
  build: ">=4.0.6 <5.0.0"
  build_runner: ^2.15.0
  build_test: ^3.5.15
  freezed: ^4.0.0-dev.3
  lint_visitor_generator:
    git: https://github.com/kumsumit/lint_visitor_generator.git
  lints: ^6.1.0
  test: ^1.31.1
